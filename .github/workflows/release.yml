name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build extension
        run: node scripts/build.mjs

      - name: Write release notes
        run: |
          VERSION="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          cat > /tmp/notes.md << EOF
          ## Install

          In any Copilot session:
          \`\`\`
          /extension install https://github.com/${REPO}
          \`\`\`

          ## What's in this release
          - \`extension.mjs\` — bundled extension with \`${VERSION}\` baked in
          - 7 roles: CO · Recon · Medic · Engineer · QA · Scribe · Judge
          - Judge + Scribe verification gates on every CO result

          ## Versioning
          See [VERSIONING.md](https://github.com/${REPO}/blob/main/VERSIONING.md)
          for the bump rules (major / minor / patch).
          EOF

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            .github/extensions/role-router/extension.mjs \
            --title "copilot-role-router ${{ github.ref_name }}" \
            --notes-file /tmp/notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    needs: [release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Ensure ci:run-failure label exists
        run: |
          gh label create "ci:run-failure" \
            --repo "${{ github.repository }}" \
            --description "Automated: pipeline run failure" \
            --color "d93f0b" \
            --force 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update failure issue
        run: |
          WORKFLOW="${{ github.workflow }}"
          TAG="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "ci:run-failure" \
            --json number,title \
            | jq --arg w "$WORKFLOW" --arg t "$TAG" \
              '[.[] | select(.title | contains($w + " " + $t))] | .[0].number // empty' \
            | tr -d '"')

          if [ -n "$EXISTING" ]; then
            echo "Existing open issue #$EXISTING — adding recurrence comment"
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "## 🔁 Recurrence

          **Run:** ${RUN_URL}
          **Tag:** \`${TAG}\`
          **Commit:** \`${{ github.sha }}\`
          **Actor:** @${{ github.actor }}
          **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          > Release for this tag is still failing. Tracking on this issue."
          else
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "🔴 Release failure: ${WORKFLOW} ${TAG}" \
              --label "ci:run-failure" \
              --body "## Release Failure

          **Workflow:** \`${WORKFLOW}\`
          **Tag:** \`${TAG}\`
          **Run:** ${RUN_URL}
          **Commit:** \`${{ github.sha }}\`
          **Actor:** @${{ github.actor }}

          ## Next steps
          1. [View the failed run and logs](${RUN_URL})
          2. Fix the issue, then delete and re-push the tag if needed:
             \`\`\`
             git tag -d ${TAG} && git push origin :${TAG}
             \`\`\`
          3. Re-tag and push to trigger a fresh release — close this issue once done

          > Auto-created by the release failure notifier."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
